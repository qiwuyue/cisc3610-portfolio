<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instrument Explorer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#0d6efd">
  <link rel="stylesheet" href="style.css">
</head>
<body>



  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Music Learning PWA</p>
        <h1>Instrument Explorer</h1>
        <p class="subtitle">Learn about musical instruments through text, images, and sound.</p>
      </div>

      <button id="installBtn" class="install-button" style="display: none;">
        Install PWA
      </button>
    </header>
    
    <section class="content-grid" aria-label="Instrument lessons">
      <nav class="topic-panel" aria-label="Instrument menu">
        <h2>Topics</h2>
        <div class="topic-menu" id="menu"></div>
      </nav>

      <article class="lesson-card">
        <div class="lesson-copy">
          <p id="category" class="category-pill"></p>
          <h2 id="title">Select an instrument</h2>

          <img
            id="image"
            class="lesson-image"
            alt=""
            style="display: none;"
          >

          <p id="text" class="lesson-text"></p>
          <p id="fact" class="fact-box"></p>

          <div class="audio-wrap">
            <span>Listen</span>
            <audio id="audio" controls style="display: none;"></audio>
          </div>
        </div>
      </article>
    </section>
    
  </main>

  
  <script src="script.js"></script>
</body>
</html>
