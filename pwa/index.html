<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progressive Web App</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d6efd">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body>
  <div class="container py-4">
    <h1 class="text-center mb-4">Instrument Explorer</h1>
    <p class="text-center">Learn about musical instruments through text, images, and sound.</p>

    <div class="text-center mb-4">
      <button id="installBtn" class="btn btn-primary" style="display: none;">
        Install PWA
      </button>
    </div>

    <div class="row g-4">
      <div class="col-12 col-md-4">
        <div class="list-group" id="menu"></div>
      </div>

      <div class="col-12 col-md-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 id="title">Select an instrument</h2>
            <p id="category" class="text-muted"></p>

            <img
              id="image"
              class="img-fluid rounded mb-3"
              alt=""
              style="display: none; max-height: 320px; object-fit: cover;"
            >

            <p id="text"></p>
            <p id="fact" class="fw-bold"></p>

            <audio id="audio" controls style="display: none; width: 100%;"></audio>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

</body>

</html>
